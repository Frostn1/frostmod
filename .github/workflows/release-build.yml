name: Build Windows Release

# Builds the x64 frostmod.exe / frostmod.dll / frostmod.dlo (client) and the
# frostserver.exe / frostserver.dll / frostserver.dlo (dedicated-server companion)
# on a Windows runner. On a published GitHub Release it attaches the frostmod
# files (the exact names frostmod.exe --update looks for on releases/latest) PLUS
# a ready-to-run Release.zip, and the frostserver files PLUS a FrostServer.zip.
# Can also be run manually (workflow_dispatch) to produce a build artifact only.
on:
  release:
    types: [published]
  workflow_dispatch:

permissions:
  contents: write        # needed to upload assets onto the release

jobs:
  build:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # frostmod.exe --update compares the release tag to FROSTMOD_VERSION and can
      # relaunch-loop if they disagree, so refuse to ship a tag that doesn't match
      # src/version.h. Strips a leading "v" and any -prerelease/+build suffix.
      - name: Verify tag matches FROSTMOD_VERSION
        if: github.event_name == 'release'
        shell: pwsh
        run: |
          $tag = "${{ github.event.release.tag_name }}" -replace '^v','' -replace '[-+].*$',''
          $ver = (Select-String -Path src/version.h -Pattern '#define FROSTMOD_VERSION "([^"]+)"').Matches[0].Groups[1].Value
          Write-Host "release tag -> $tag ; version.h -> $ver"
          if ($tag -ne $ver) {
            Write-Error "Release tag ($tag) != FROSTMOD_VERSION ($ver). Bump src/version.h and CMakeLists.txt, retag, and re-release."
            exit 1
          }

      - name: Configure (CMake, x64)
        run: cmake -B build -A x64

      - name: Build (Release)
        run: cmake --build build --config Release

      - name: Collect binaries
        shell: pwsh
        run: |
          # MSVC is a multi-config generator, so the binaries land in
          # build/bin/Release (the config is appended to RUNTIME_OUTPUT_DIRECTORY).
          $bin = 'build/bin/Release'
          New-Item -ItemType Directory -Force dist | Out-Null
          foreach ($f in 'frostmod.exe','frostmod.dll','frostmod.dlo',
                         'frostserver.exe','frostserver.dll','frostserver.dlo') {
            if (-not (Test-Path "$bin/$f")) { Write-Error "missing $bin/$f"; exit 1 }
            Copy-Item "$bin/$f" dist/
          }
          Get-ChildItem dist

      # Build a ready-to-run bundle: the three binaries + the default server-filter
      # config + a short README, zipped as FrostMod/ so it extracts tidily. The
      # config is extracted from src/serverfilter.cpp (kDefaultConfig) so the shipped
      # file is byte-identical to what the DLL writes on first run - single source of
      # truth, no drift. Flag files (frostmod_*.flag) are opt-in runtime toggles and
      # are deliberately NOT bundled.
      - name: Package Release.zip
        shell: pwsh
        run: |
          $stage = 'staging/FrostMod'
          New-Item -ItemType Directory -Force $stage | Out-Null
          Copy-Item dist/frostmod.exe, dist/frostmod.dll, dist/frostmod.dlo $stage

          # --- default server-filter config, extracted from the C++ source ---------
          $src = Get-Content src/serverfilter.cpp -Raw
          # Match the whole run of adjacent "..." string literals up to the terminating
          # ';'. Matching the literal run (not '.*?;') avoids stopping on a ';' that
          # appears inside a config comment, e.g. "maxPerIP: 0  # 0 = off; else ...".
          $m = [regex]::Match($src, 'kDefaultConfig\s*=\s*((?:\s*"(?:[^"\\]|\\.)*")+)\s*;', 'Singleline')
          if (-not $m.Success) { Write-Error 'could not find kDefaultConfig in src/serverfilter.cpp'; exit 1 }
          $sb = [System.Text.StringBuilder]::new()
          foreach ($lit in [regex]::Matches($m.Groups[1].Value, '"((?:[^"\\]|\\.)*)"')) {
            $unescaped = [regex]::Replace($lit.Groups[1].Value, '\\(.)', {
              param($e)
              switch ($e.Groups[1].Value) { 'n' {"`n"} 't' {"`t"} '"' {'"'} '\' {'\'} default {$e.Groups[1].Value} }
            })
            [void]$sb.Append($unescaped)
          }
          if ($sb.Length -eq 0) { Write-Error 'extracted server-filter config is empty'; exit 1 }
          # Guard against a partial extraction (the config ends with the regex block).
          if ($sb -notmatch '(?m)^regex:') { Write-Error 'extracted server-filter config looks truncated (no regex: block)'; exit 1 }
          # Write with CRLF so the .yaml opens cleanly in Notepad.
          $yaml = $sb.ToString() -replace "`r?`n", "`r`n"
          Set-Content -Path "$stage/frostmod_serverfilter.yaml" -Value $yaml -NoNewline -Encoding utf8

          # --- README --------------------------------------------------------------
          $tag = if ($env:GITHUB_EVENT_NAME -eq 'release') { '${{ github.event.release.tag_name }}' }
                 else { 'v' + (Select-String -Path src/version.h -Pattern '#define FROSTMOD_VERSION "([^"]+)"').Matches[0].Groups[1].Value }
          $readme = @(
            "FrostMod $tag - in-game overlay / mod loader for MX Bikes"
            "https://github.com/Frostn1/frostmod"
            ""
            "QUICK START"
            "  1. Keep frostmod.exe and frostmod.dll together in this folder."
            "  2. Run frostmod.exe. It waits for MX Bikes and loads the overlay;"
            "     press F8 in-game to open the FrostMod menu."
            ""
            "PLUGIN MODE (no injection)"
            "  frostmod.exe --install-plugin"
            "     copies frostmod.dlo into <MX Bikes>\plugins\ so the game loads it"
            "     at startup - no injector."
            ""
            "SERVER FILTER"
            "  frostmod_serverfilter.yaml (this folder) hides spam/ad servers from the"
            "  online browser. Edit it to tune the rules, or delete it to regenerate"
            "  the defaults on next run. Turn it off with: frostmod.exe --no-filter-servers"
            ""
            "UPDATE"
            "  frostmod.exe --update      downloads and installs the latest release."
            ""
            "NOTE: these binaries are not code-signed, so Windows SmartScreen or your"
            "antivirus may warn on first run. FrostMod is open source - build it"
            "yourself or use plugin mode if you prefer. See the project page."
          ) -join "`r`n"
          Set-Content -Path "$stage/README.txt" -Value $readme -Encoding utf8

          Compress-Archive -Path $stage -DestinationPath dist/Release.zip -Force
          Get-ChildItem dist
          Write-Host "--- Release.zip contents ---"
          Get-ChildItem $stage | Select-Object Name, Length

      # Server-admin bundle: the plugin (.dlo) + the standalone tester (.exe) +
      # a short README. frostserver writes its own frostserver.yaml next to the
      # plugin on first run, so no config is bundled.
      - name: Package FrostServer.zip
        shell: pwsh
        run: |
          $stage = 'staging/FrostServer'
          New-Item -ItemType Directory -Force $stage | Out-Null
          Copy-Item dist/frostserver.dlo, dist/frostserver.exe $stage

          $tag = if ($env:GITHUB_EVENT_NAME -eq 'release') { '${{ github.event.release.tag_name }}' }
                 else { 'v' + (Select-String -Path src/version.h -Pattern '#define FROSTMOD_VERSION "([^"]+)"').Matches[0].Groups[1].Value }
          $readme = @(
            "FrostServer $tag - dedicated-server map/link API for MX Bikes"
            "https://github.com/Frostn1/frostmod  (full docs: docs/FROSTSERVER.md)"
            ""
            "WHAT IT IS"
            "  A companion for MX Bikes DEDICATED servers. It publishes the track the"
            "  server is running plus a mxb-mods.com download link over a tiny read-only"
            "  HTTP API, so FrostMod clients can grab a server's map without leaving the"
            "  game."
            ""
            "INSTALL (plugin)"
            "  1. Copy frostserver.dlo into your dedicated server's plugins\ folder."
            "  2. Start the server, load a track, then edit frostserver.yaml (written"
            "     next to the plugin) to map each track name to its mxb-mods.com page."
            "     Restart the server to apply."
            "  3. API: http://<server-ip>:54210/frostserver/info"
            ""
            "TEST WITHOUT A SERVER"
            "  frostserver.exe --track `"Some Track Name`""
            "     serves the same API with no game attached."
            ""
            "NOTE: unsigned binaries; Windows SmartScreen/AV may warn on first run."
          ) -join "`r`n"
          Set-Content -Path "$stage/README.txt" -Value $readme -Encoding utf8

          Compress-Archive -Path $stage -DestinationPath dist/FrostServer.zip -Force
          Write-Host "--- FrostServer.zip contents ---"
          Get-ChildItem $stage | Select-Object Name, Length

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: frostmod-windows-x64
          path: dist/*
          if-no-files-found: error

      - name: Attach binaries + Release.zip to the release
        if: github.event_name == 'release'
        shell: pwsh
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release upload "${{ github.event.release.tag_name }}" `
            dist/frostmod.exe dist/frostmod.dll dist/frostmod.dlo dist/Release.zip `
            dist/frostserver.exe dist/frostserver.dll dist/frostserver.dlo dist/FrostServer.zip --clobber
